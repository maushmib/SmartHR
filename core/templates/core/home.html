<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Home - Smart HR</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(120deg, #e0eafc, #cfdef3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #ffffff;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            color: #007bff;
            margin-bottom: 20px;
        }

        p {
            margin-top: 30px;
        }

        a {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin: 0 10px;
            color: #ffffff;
            background-color: #007bff;
            transition: background-color 0.3s;
            font-weight: 500;
        }

        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Smart-HR</h1>
        <p>
            <a href="{% url 'register' %}">Register</a>
            <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</body>
</html>
