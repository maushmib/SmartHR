<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Employee Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f7f9fc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    nav {
      background-color: #3498db;
      padding: 15px 20px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-container {
      max-width: 700px;
      margin: 80px auto;
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 25px rgba(0, 123, 255, 0.3);
    }

    h2 {
      text-align: center;
      font-weight: bold;
      color: #007bff;
      margin-bottom: 30px;
    }

    label {
      font-weight: 500;
    }

    .btn-primary {
      background-color: #007bff;
      border: none;
    }

    .btn-primary:hover {
      background-color: #0056b3;
    }

    .btn-secondary {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div style="font-size: 20px; font-weight: bold;">Employee Dashboard</div>
    <div>
      <a href="{% url 'my_ratings' %}" class="btn btn-light">My Ratings</a>
      <a href="{% url 'upload_resume' %}" class="btn btn-light">Upload Resume</a>
      <a href="{% url 'edit_employee_profile' %}" class="btn btn-light">Edit Profile</a>
      <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
    </div>
  </nav>

  <!-- FORM SECTION -->
  <div class="form-container">
    <h2>Edit Your Profile</h2>
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      {% for field in form %}
        <div class="mb-3">
          <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small">{{ field.errors }}</div>
          {% endif %}
        </div>
      {% endfor %}

      <button type="submit" class="btn btn-primary">Save Profile</button>
      <a href="{% url 'dashboard' %}" class="btn btn-secondary ms-2">Back to Dashboard</a>
    </form>
  </div>

</body>
</html>
