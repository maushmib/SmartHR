<!-- templates/core/view_my_ratings.html -->
<!DOCTYPE html>
<html>
<head>
    <title>My Ratings</title>
    <style>
        body { font-family: Arial; background-color: #eef; }
        h2 { text-align: center; margin-top: 30px; color: #004488; }
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ccc;
        }
        th {
            background-color: #004488;
            color: white;
        }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>
    <h2>My Performance Ratings</h2>

    <table>
        <tr>
            <th>Rated By</th>
            <th>Rating</th>
            <th>Comments</th>
            <th>Date</th>
        </tr>
        {% for rating in ratings %}
        <tr>
            <td>{{ rating.rated_by.get_full_name|default:rating.rated_by.username }}</td>
            <td>{{ rating.rating }}</td>
            <td>{{ rating.comments|default:"No comment" }}</td>
            <td>{{ rating.date_rated|date:"M d, Y" }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No ratings available.</td></tr>
        {% endfor %}
    </table>
</body>
</html>
