<!-- templates/give_rating.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Give Performance Rating</title>
    <style>
        body {
            background: #f2f2f2;
            font-family: Arial;
        }
        .container {
            margin: 50px auto;
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
        input, select, textarea, button {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #4CAF50;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Give Rating</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit Rating</button>
    </form>
</div>
</body>
</html>
