<!DOCTYPE html>
<html>
<head>
    <title>Match Result</title>
</head>
<body>
    <h2>Match Result</h2>

    <p><strong>Employee:</strong> {{ employee.name }}</p>
    <p><strong>Job Description:</strong><br>{{ jd }}</p>
    <hr>

    <p><strong>Match Score for {{ employee.name }}:</strong> {{ score }}%</p>

    {% if employee.resume_file %}
        <a href="{{ employee.resume_file.url }}" target="_blank">View Resume</a>
    {% else %}
        <p>No resume uploaded.</p>
    {% endif %}

    <br><br>
    <a href="{% url 'match_resume' %}">Try another match</a>

</body>
</html>
